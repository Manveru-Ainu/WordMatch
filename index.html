<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordMatch</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f4ff; --white:#fff; --surface:#f8f9ff;
  --blue:#5b6af0; --blue-bg:#eef0ff;
  --green:#00c48c; --green-bg:#e8faf3;
  --red:#f0556a; --red-bg:#fff0f2;
  --orange:#f57c00; --orange-bg:#fff8e1;
  --muted:#7880aa; --text:#1a1d3a; --border:#e0e4f5;
  --noun:#2196f3; --noun-bg:#e3f2fd; --noun-br:#90caf9;
  --adj:#f57c00;  --adj-bg:#fff3e0;  --adj-br:#ffb74d;
  --verb:#7b1fa2; --verb-bg:#f3e5f5; --verb-br:#ce93d8;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.screen { display:none; }
.screen.on { display:flex; flex-direction:column; min-height:100vh; }

/* LOBBY */
#lobby { align-items:center; justify-content:center; padding:2rem 1rem; gap:1.5rem; }
.logo h1 {
  font-size:clamp(2.5rem,8vw,4rem); font-weight:900; letter-spacing:-2px; text-align:center;
  background:linear-gradient(135deg,#5b6af0,#f0556a,#00c48c);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.logo p { text-align:center; color:var(--muted); font-size:.85rem; letter-spacing:3px; text-transform:uppercase; margin-top:.3rem; }
.card { background:var(--white); border:2px solid var(--border); border-radius:18px; padding:2rem; width:100%; max-width:440px; display:flex; flex-direction:column; gap:1.1rem; box-shadow:0 4px 24px rgba(91,106,240,.10); }
.card h2 { font-size:1.1rem; font-weight:800; color:var(--blue); }
label { display:block; font-size:.72rem; text-transform:uppercase; letter-spacing:2px; color:var(--muted); font-weight:700; margin-bottom:.35rem; }
input[type=text], input[type=number] { width:100%; background:var(--surface); border:2px solid var(--border); border-radius:10px; padding:.8rem 1rem; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; color:var(--text); outline:none; }
input:focus { border-color:var(--blue); }
input::placeholder { color:#b0b8d4; }
.cats { display:grid; grid-template-columns:repeat(3,1fr); gap:.5rem; }
.cat { padding:.7rem .4rem; border-radius:10px; border:2px solid var(--border); background:var(--surface); cursor:pointer; font-family:'Nunito',sans-serif; font-size:.82rem; font-weight:800; color:var(--muted); display:flex; flex-direction:column; align-items:center; gap:.3rem; }
.cat span { font-size:1.3rem; }
.cat.on.noun { border-color:var(--noun); background:var(--noun-bg); color:var(--noun); }
.cat.on.adj  { border-color:var(--adj);  background:var(--adj-bg);  color:var(--adj);  }
.cat.on.verb { border-color:var(--verb); background:var(--verb-bg); color:var(--verb); }
hr { border:none; border-top:2px solid var(--border); }
.btn { width:100%; padding:.85rem; border-radius:12px; border:none; cursor:pointer; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:800; display:flex; align-items:center; justify-content:center; gap:.5rem; }
.btn-blue  { background:linear-gradient(135deg,#5b6af0,#7c8cf8); color:#fff; box-shadow:0 4px 18px rgba(91,106,240,.30); }
.btn-green { background:linear-gradient(135deg,#00c48c,#00e0a0); color:#fff; }
.btn-gray  { background:var(--surface); color:var(--text); border:2px solid var(--border); }
.btn-red   { background:var(--red-bg); color:var(--red); border:2px solid #ffc0c8; }
.btn-skip  { background:var(--orange-bg); color:var(--orange); border:2px solid #ffe082; font-size:.88rem; padding:.55rem 1rem; width:auto; }
.btn:disabled { opacity:.35; cursor:not-allowed; }

/* GAME */
#game { padding:1rem; gap:.7rem; max-width:980px; margin:0 auto; width:100%; }
.ghead { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:.5rem; }
.gtitle { font-size:1.2rem; font-weight:900; color:var(--blue); }
.sbar { display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; }
.spill { background:var(--white); border:2px solid var(--border); border-radius:100px; padding:.4rem 1rem; font-size:.85rem; font-weight:800; display:flex; align-items:center; gap:.45rem; }
.spill.turn { border-color:var(--blue); background:var(--blue-bg); }
.spill .pts { font-family:monospace; color:var(--blue); }
.legend { display:flex; gap:1rem; flex-wrap:wrap; font-size:.73rem; color:var(--muted); font-weight:700; }
.legend span { display:flex; align-items:center; gap:.3rem; }
.dot { width:9px; height:9px; border-radius:50%; display:inline-block; }
.dot.noun{background:var(--noun);} .dot.adj{background:var(--adj);} .dot.verb{background:var(--verb);}
.dot.reg{background:#43a047;} .dot.irr{background:#e53935;}
.tbanner { text-align:center; padding:.65rem 1rem; border-radius:12px; font-size:.95rem; font-weight:800; border:2px solid var(--border); background:var(--white); }
.tbanner.mine   { border-color:var(--blue); background:var(--blue-bg); color:var(--blue); }
.tbanner.theirs { color:var(--muted); }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(88px,1fr)); gap:.55rem; }
.cw { aspect-ratio:2/3; perspective:800px; cursor:pointer; }
.cw.matched { pointer-events:none; }
.ci { position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform .45s cubic-bezier(.34,1.15,.64,1); }
.cw.flipped .ci, .cw.matched .ci { transform:rotateY(180deg); }
.cf { position:absolute; inset:0; border-radius:14px; backface-visibility:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:.5rem; border:2px solid transparent; gap:.3rem; text-align:center; }
.cb { background:linear-gradient(135deg,#5b6af0,#7c8cf8); overflow:hidden; }
.cb::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(255,255,255,.06) 10px,rgba(255,255,255,.06) 11px); }
.cb-ico { font-size:1.8rem; position:relative; z-index:1; }
.cf.noun { border-color:var(--noun-br); background:var(--noun-bg); transform:rotateY(180deg); }
.cf.adj  { border-color:var(--adj-br);  background:var(--adj-bg);  transform:rotateY(180deg); }
.cf.verb { border-color:var(--verb-br); background:var(--verb-bg); transform:rotateY(180deg); }
.cw.matched .cf { background:var(--green-bg)!important; border-color:var(--green)!important; }
.cw.matched .cword { color:#00a07a; }
.cbadge { font-size:.58rem; font-family:monospace; text-transform:uppercase; letter-spacing:1px; padding:.12rem .45rem; border-radius:100px; font-weight:700; }
.cbadge.noun{background:#bbdefb;color:var(--noun);}
.cbadge.adj {background:#ffe0b2;color:var(--adj);}
.cbadge.verb{background:#e1bee7;color:var(--verb);}
.tbadge { font-size:.55rem; font-family:monospace; text-transform:uppercase; padding:.1rem .4rem; border-radius:100px; font-weight:700; }
.tbadge.regular   {background:#e8f5e9;color:#43a047;}
.tbadge.irregular {background:#ffebee;color:#e53935;}
.cword { font-size:clamp(.75rem,2vw,1rem); font-weight:900; line-height:1.2; word-break:break-word; }
.chint { font-size:clamp(.52rem,1.5vw,.65rem); color:var(--muted); font-style:italic; line-height:1.3; }
@keyframes shake { 0%,100%{transform:rotateY(180deg) translateX(0)} 20%,60%{transform:rotateY(180deg) translateX(-5px)} 40%,80%{transform:rotateY(180deg) translateX(5px)} }
.cw.wrong .ci { animation:shake .4s ease; }

/* RESULTS */
#results { align-items:center; justify-content:center; padding:2rem; gap:1.5rem; }
.rcard { background:var(--white); border:2px solid var(--border); border-radius:18px; padding:2.5rem; width:100%; max-width:460px; text-align:center; display:flex; flex-direction:column; gap:1.4rem; box-shadow:0 4px 24px rgba(91,106,240,.10); }
.rtrophy { font-size:4rem; }
.rtitle { font-size:2rem; font-weight:900; letter-spacing:-1px; background:linear-gradient(135deg,var(--blue),var(--red)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.podium { display:flex; flex-direction:column; gap:.6rem; }
.prow { display:flex; align-items:center; background:var(--surface); border-radius:12px; padding:.8rem 1.2rem; border:2px solid var(--border); }
.prow.win { border-color:var(--green); background:var(--green-bg); }
.medal { font-size:1.2rem; width:28px; }
.pname { flex:1; text-align:left; font-weight:800; padding:0 .8rem; }
.pscore { font-family:monospace; font-weight:700; color:var(--blue); }

/* TOAST */
#toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(80px); border-radius:100px; padding:.7rem 1.6rem; font-size:.9rem; font-weight:800; z-index:999; transition:transform .3s, opacity .3s; opacity:0; pointer-events:none; white-space:nowrap; border:2px solid transparent; }
#toast.on  { transform:translateX(-50%) translateY(0); opacity:1; }
#toast.ok  { background:var(--green-bg); border-color:var(--green); color:#00a07a; }
#toast.err { background:var(--red-bg);   border-color:#ffc0c8;      color:var(--red); }
#toast.inf { background:var(--blue-bg);  border-color:var(--noun-br);color:var(--blue); }
@media(max-width:480px){ .grid{grid-template-columns:repeat(5,1fr);gap:.35rem;} .cword{font-size:.68rem;} .chint{font-size:.5rem;} }
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby" class="screen on">
  <div class="logo"><h1>WordMatch</h1><p>English Memory Game</p></div>
  <div class="card">
    <h2>🎮 Play Game</h2>
    <div>
      <label>Your Name</label>
      <input type="text" id="host-name" placeholder="Enter your name" maxlength="20">
    </div>
    <div>
      <label>Word Categories</label>
      <div class="cats">
        <button type="button" class="cat noun on" data-cat="nouns"><span>📘</span>Nouns</button>
        <button type="button" class="cat adj  on" data-cat="adjectives"><span>🟠</span>Adjectives</button>
        <button type="button" class="cat verb on" data-cat="verbs"><span>🟣</span>Verbs</button>
      </div>
    </div>
    <div>
      <label>Number of Pairs</label>
      <input type="number" id="pair-count" value="8" min="4" max="30">
    </div>
    <button type="button" class="btn btn-blue" id="btn-create">✨ Start Game</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="ghead">
    <span class="gtitle">⚡ WordMatch</span>
    <div class="sbar">
      <div id="sbar"></div>
      <button type="button" class="btn btn-skip" id="btn-skip" disabled>⏭ Skip</button>
      <button type="button" class="btn btn-gray" id="btn-quit" style="width:auto;padding:.55rem 1rem;font-size:.88rem">🏠 Quit</button>
    </div>
  </div>
  <div class="legend" id="legend"></div>
  <div class="tbanner mine" id="tbanner">✨ Your turn! Flip two cards.</div>
  <div class="grid" id="grid"></div>
</div>

<!-- RESULTS -->
<div id="results" class="screen">
  <div class="rcard">
    <div class="rtrophy">🏆</div>
    <div class="rtitle">You Win! 🎉</div>
    <div class="podium" id="podium"></div>
    <div style="display:flex;flex-direction:column;gap:.6rem">
      <button type="button" class="btn btn-blue" id="btn-again">🔄 Play Again</button>
      <button type="button" class="btn btn-gray" id="btn-lobby">🏠 Back to Lobby</button>
    </div>
  </div>
</div>

<div id="toast"></div>

/* ── STATE ── */
var myName   = '';
var pairCount = 8;
var selCats  = {nouns:true, adjectives:true, verbs:true};
var cards    = [];
var flipped  = [];
var matched  = {};
var score    = 0;
var canFlip  = false;

/* ── HELPERS ── */
function show(id) {
  var all = document.querySelectorAll('.screen');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('on');
  document.getElementById(id).classList.add('on');
}

var toastT = null;
function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'on ' + (type || 'inf');
  clearTimeout(toastT);
  toastT = setTimeout(function() { t.className = ''; }, 2500);
}

function shuffle(arr) {
  for (var i = arr.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

function catCls(cat) {
  if (cat === 'adjectives') return 'adj';
  if (cat === 'nouns')      return 'noun';
  return 'verb';
}

/* ── TOGGLE CAT ── */
function toggleCat(btn) {
  var cat = btn.getAttribute('data-cat');
  var count = 0;
  var keys = Object.keys(selCats);
  for (var i = 0; i < keys.length; i++) { if (selCats[keys[i]]) count++; }
  if (btn.classList.contains('on')) {
    if (count <= 1) { toast('Select at least one category', 'err'); return; }
    btn.classList.remove('on');
    selCats[cat] = false;
  } else {
    btn.classList.add('on');
    selCats[cat] = true;
  }
}

/* ── BUILD DECK ── */
function buildDeck() {
  var pool = [];
  var keys = Object.keys(selCats);
  for (var k = 0; k < keys.length; k++) {
    if (!selCats[keys[k]]) continue;
    var list = WORDS[keys[k]];
    for (var j = 0; j < list.length; j++) {
      pool.push({word:list[j].w, hint:list[j].h, match:list[j].m, mhint:list[j].mh, type:list[j].t, cat:keys[k]});
    }
  }
  shuffle(pool);
  var pairs = pool.slice(0, pairCount);
  var deck  = [];
  for (var i = 0; i < pairs.length; i++) {
    var p = pairs[i];
    deck.push({word:p.word,  hint:p.hint,  cat:p.cat, pid:i, side:'A', wt:p.type});
    deck.push({word:p.match, hint:p.mhint, cat:p.cat, pid:i, side:'B', wt:p.type});
  }
  return shuffle(deck);
}

/* ── START ── */
function startGame() {
  myName = document.getElementById('host-name').value.trim();
  if (!myName) { toast('Enter your name first', 'err'); return; }
  pairCount = parseInt(document.getElementById('pair-count').value) || 8;
  pairCount = Math.max(4, Math.min(30, pairCount));

  cards   = buildDeck();
  flipped = [];
  matched = {};
  score   = 0;
  canFlip = true;

  show('game');
  renderBoard();
  renderScore();
  document.getElementById('btn-skip').disabled = false;
}

/* ── RENDER ── */
function renderBoard() {
  var catLabels = {nouns:'Noun', adjectives:'Adj', verbs:'Verb'};
  var grid = document.getElementById('grid');
  grid.innerHTML = '';

  /* legend */
  var leg = document.getElementById('legend');
  var activeCats = {};
  for (var x = 0; x < cards.length; x++) activeCats[cards[x].cat] = true;
  leg.innerHTML = '';
  var cnames = Object.keys(activeCats);
  for (var ci = 0; ci < cnames.length; ci++) {
    var cls = catCls(cnames[ci]);
    leg.innerHTML += '<span><span class="dot ' + cls + '"></span>' + catLabels[cnames[ci]] + '</span>';
  }
  leg.innerHTML += '<span><span class="dot reg"></span>Regular</span>';
  leg.innerHTML += '<span><span class="dot irr"></span>Irregular</span>';

  /* cards */
  for (var i = 0; i < cards.length; i++) {
    (function(idx) {
      var card = cards[idx];
      var cls  = catCls(card.cat);
      var wrap = document.createElement('div');
      wrap.className = 'cw';
      if (matched[card.pid])          wrap.classList.add('matched','flipped');
      else if (flipped.indexOf(idx) >= 0) wrap.classList.add('flipped');
      wrap.innerHTML =
        '<div class="ci">' +
          '<div class="cf cb"><div class="cb-ico">🃏</div></div>' +
          '<div class="cf ' + cls + '">' +
            '<span class="cbadge ' + cls + '">' + catLabels[card.cat] + '</span>' +
            '<span class="tbadge ' + card.wt + '">' + card.wt + '</span>' +
            '<span class="cword">' + card.word + '</span>' +
            '<span class="chint">' + card.hint + '</span>' +
          '</div>' +
        '</div>';
      wrap.addEventListener('click', function() { flipCard(idx); });
      grid.appendChild(wrap);
    })(i);
  }
}

function renderScore() {
  document.getElementById('sbar').innerHTML =
    '<div class="spill turn">👤 ' + myName + ' <span class="pts">' + score + '</span></div>';
}

/* ── FLIP ── */
function flipCard(idx) {
  if (!canFlip) return;
  if (matched[cards[idx].pid]) return;
  if (flipped.indexOf(idx) >= 0) return;

  flipped.push(idx);
  var wraps = document.querySelectorAll('.cw');
  wraps[idx].classList.add('flipped');

  if (flipped.length < 2) return;

  canFlip = false;
  document.getElementById('btn-skip').disabled = true;

  var i1 = flipped[0], i2 = flipped[1];
  var c1 = cards[i1],  c2 = cards[i2];

  setTimeout(function() {
    if (c1.pid === c2.pid && c1.side !== c2.side) {
      /* ✅ Match */
      matched[c1.pid] = true;
      score++;
      var w1 = wraps[i1], w2 = wraps[i2];
      if (w1) w1.classList.add('matched');
      if (w2) w2.classList.add('matched');
      flipped = [];
      renderScore();
      canFlip = true;
      document.getElementById('btn-skip').disabled = false;
      var total = Object.keys(matched).length;
      if (total >= pairCount) {
        setTimeout(function() { showResults(); }, 400);
      } else {
        toast('Match! Keep going!', 'ok');
      }
    } else {
      /* ❌ No match */
      var w1 = wraps[i1], w2 = wraps[i2];
      if (w1) w1.classList.add('wrong');
      if (w2) w2.classList.add('wrong');
      setTimeout(function() {
        if (w1) { w1.classList.remove('flipped','wrong'); }
        if (w2) { w2.classList.remove('flipped','wrong'); }
        flipped = [];
        canFlip = true;
        document.getElementById('btn-skip').disabled = false;
      }, 800);
    }
  }, 900);
}

/* ── SKIP ── */
function skipTurn() {
  if (!canFlip) return;
  flipped = [];
  var wraps = document.querySelectorAll('.cw');
  for (var i = 0; i < wraps.length; i++) {
    if (!wraps[i].classList.contains('matched')) wraps[i].classList.remove('flipped');
  }
  toast('Turn skipped', 'inf');
}

/* ── RESULTS ── */
function showResults() {
  show('results');
  var pod = document.getElementById('podium');
  pod.innerHTML = '<div class="prow win"><span class="medal">🥇</span><span class="pname">' + myName + '</span><span class="pscore">' + score + ' pts</span></div>';
}

/* ── WIRE BUTTONS ── */
document.getElementById('btn-create').addEventListener('click', startGame);
document.getElementById('btn-skip').addEventListener('click',   skipTurn);
document.getElementById('btn-quit').addEventListener('click',   function() { show('lobby'); });
document.getElementById('btn-again').addEventListener('click',  startGame);
document.getElementById('btn-lobby').addEventListener('click',  function() { show('lobby'); });

var cats = document.querySelectorAll('.cat');
for (var i = 0; i < cats.length; i++) {
  (function(btn) { btn.addEventListener('click', function() { toggleCat(btn); }); })(cats[i]);
}

document.getElementById('host-name').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') startGame();
});
</script>
