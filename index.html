<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordMatch</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f4ff; --white:#fff; --surface:#f8f9ff;
  --blue:#5b6af0; --blue-bg:#eef0ff;
  --green:#00c48c; --green-bg:#e8faf3;
  --red:#f0556a; --red-bg:#fff0f2;
  --orange:#f57c00; --orange-bg:#fff8e1;
  --purple:#7b1fa2; --purple-bg:#f3e5f5;
  --muted:#7880aa; --text:#1a1d3a; --border:#e0e4f5;
  --noun:#2196f3; --noun-bg:#e3f2fd; --noun-br:#90caf9;
  --adj:#f57c00;  --adj-bg:#fff3e0;  --adj-br:#ffb74d;
  --verb:#7b1fa2; --verb-bg:#f3e5f5; --verb-br:#ce93d8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.screen{display:none;}
.screen.on{display:flex;flex-direction:column;min-height:100vh;}

/* ── LOBBY ── */
#lobby{align-items:center;justify-content:center;padding:2rem 1rem;gap:1.5rem;}
.logo h1{font-size:clamp(2.5rem,8vw,4rem);font-weight:900;letter-spacing:-2px;text-align:center;background:linear-gradient(135deg,#5b6af0,#f0556a,#00c48c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.logo p{text-align:center;color:var(--muted);font-size:.85rem;letter-spacing:3px;text-transform:uppercase;margin-top:.3rem;}
.card{background:var(--white);border:2px solid var(--border);border-radius:18px;padding:2rem;width:100%;max-width:440px;display:flex;flex-direction:column;gap:1.1rem;box-shadow:0 4px 24px rgba(91,106,240,.10);}
.card h2{font-size:1.1rem;font-weight:800;color:var(--blue);}
label{display:block;font-size:.72rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:700;margin-bottom:.35rem;}
input[type=text],input[type=number]{width:100%;background:var(--surface);border:2px solid var(--border);border-radius:10px;padding:.8rem 1rem;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:700;color:var(--text);outline:none;}
input:focus{border-color:var(--blue);}
input::placeholder{color:#b0b8d4;}
.cats{display:grid;grid-template-columns:repeat(3,1fr);gap:.5rem;}
.cat{padding:.7rem .4rem;border-radius:10px;border:2px solid var(--border);background:var(--surface);cursor:pointer;font-family:'Nunito',sans-serif;font-size:.82rem;font-weight:800;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:.3rem;}
.cat span{font-size:1.3rem;}
.cat.on.noun{border-color:var(--noun);background:var(--noun-bg);color:var(--noun);}
.cat.on.adj {border-color:var(--adj); background:var(--adj-bg); color:var(--adj);}
.cat.on.verb{border-color:var(--verb);background:var(--verb-bg);color:var(--verb);}
hr{border:none;border-top:2px solid var(--border);}
.btn{width:100%;padding:.85rem;border-radius:12px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;display:flex;align-items:center;justify-content:center;gap:.5rem;}
.btn-blue  {background:linear-gradient(135deg,#5b6af0,#7c8cf8);color:#fff;box-shadow:0 4px 18px rgba(91,106,240,.30);}
.btn-green {background:linear-gradient(135deg,#00c48c,#00e0a0);color:#fff;}
.btn-gray  {background:var(--surface);color:var(--text);border:2px solid var(--border);}
.btn-red   {background:var(--red-bg);color:var(--red);border:2px solid #ffc0c8;}
.btn-orange{background:var(--orange-bg);color:var(--orange);border:2px solid #ffe082;font-size:.88rem;padding:.55rem 1rem;width:auto;}
.btn:disabled{opacity:.35;cursor:not-allowed;}
.join-row{display:flex;gap:.6rem;}
.join-row input{flex:1;text-transform:uppercase;letter-spacing:4px;text-align:center;font-size:1.1rem;}

/* ── WAITING ── */
#waiting{align-items:center;justify-content:center;padding:2rem;gap:1.5rem;}
.code-box{font-family:monospace;font-size:clamp(2rem,10vw,3.5rem);font-weight:700;color:var(--blue);background:var(--white);padding:1rem 2.5rem;border-radius:18px;border:2px solid var(--noun-br);letter-spacing:10px;cursor:pointer;box-shadow:0 0 0 6px rgba(91,106,240,.06);}
.code-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;text-align:center;margin-top:.4rem;}
.plist{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.7rem;width:100%;max-width:500px;}
.pchip{background:var(--white);border:2px solid var(--border);border-radius:12px;padding:.7rem 1rem;display:flex;align-items:center;gap:.6rem;font-size:.9rem;font-weight:700;}
.pchip .av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--red));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;flex-shrink:0;}
.pchip.me{border-color:var(--blue);background:var(--blue-bg);}
.wmsg{color:var(--muted);font-size:.9rem;font-weight:700;text-align:center;}
.hbtns{display:none;flex-direction:column;gap:.6rem;width:100%;max-width:300px;}
.gbtns{display:none;}

/* ── GAME ── */
#game{padding:1rem;gap:.7rem;max-width:980px;margin:0 auto;width:100%;}
.ghead{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;}
.gtitle{font-size:1.2rem;font-weight:900;color:var(--blue);}
.sbar-wrap{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;}
.spill{background:var(--white);border:2px solid var(--border);border-radius:100px;padding:.4rem 1rem;font-size:.85rem;font-weight:800;display:flex;align-items:center;gap:.45rem;}
.spill.turn{border-color:var(--blue);background:var(--blue-bg);}
.spill .pts{font-family:monospace;color:var(--blue);}

/* Timer bar */
.timer-wrap{background:var(--surface);border-radius:10px;border:2px solid var(--border);padding:.5rem 1rem;display:flex;align-items:center;gap:.8rem;}
.timer-label{font-size:.72rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:700;font-family:monospace;white-space:nowrap;}
.timer-val{font-family:monospace;font-size:1.1rem;font-weight:900;color:var(--blue);min-width:42px;}
.timer-val.warn{color:var(--red);}
.timer-bar-bg{flex:1;height:8px;background:var(--border);border-radius:100px;overflow:hidden;}
.timer-bar{height:100%;background:var(--blue);border-radius:100px;transition:width .5s linear,background .5s;}
.timer-bar.warn{background:var(--red);}

.legend{display:flex;gap:1rem;flex-wrap:wrap;font-size:.73rem;color:var(--muted);font-weight:700;}
.legend span{display:flex;align-items:center;gap:.3rem;}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
.dot.noun{background:var(--noun);} .dot.adj{background:var(--adj);} .dot.verb{background:var(--verb);}
.dot.reg{background:#43a047;} .dot.irr{background:#e53935;}
.tbanner{text-align:center;padding:.65rem 1rem;border-radius:12px;font-size:.95rem;font-weight:800;border:2px solid var(--border);background:var(--white);}
.tbanner.mine  {border-color:var(--blue);background:var(--blue-bg);color:var(--blue);}
.tbanner.theirs{color:var(--muted);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:.55rem;}
.cw{aspect-ratio:2/3;perspective:800px;cursor:pointer;}
.cw.matched{pointer-events:none;}
.ci{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .45s cubic-bezier(.34,1.15,.64,1);}
.cw.flipped .ci,.cw.matched .ci{transform:rotateY(180deg);}
.cf{position:absolute;inset:0;border-radius:14px;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.5rem;border:2px solid transparent;gap:.3rem;text-align:center;}
.cb{background:linear-gradient(135deg,#5b6af0,#7c8cf8);overflow:hidden;}
.cb::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(255,255,255,.06) 10px,rgba(255,255,255,.06) 11px);}
.cb-ico{font-size:1.8rem;position:relative;z-index:1;}
.cf.noun{border-color:var(--noun-br);background:var(--noun-bg);transform:rotateY(180deg);}
.cf.adj {border-color:var(--adj-br); background:var(--adj-bg); transform:rotateY(180deg);}
.cf.verb{border-color:var(--verb-br);background:var(--verb-bg);transform:rotateY(180deg);}
.cw.matched .cf{background:var(--green-bg)!important;border-color:var(--green)!important;}
.cw.matched .cword{color:#00a07a;}
.cbadge{font-size:.58rem;font-family:monospace;text-transform:uppercase;letter-spacing:1px;padding:.12rem .45rem;border-radius:100px;font-weight:700;}
.cbadge.noun{background:#bbdefb;color:var(--noun);}
.cbadge.adj {background:#ffe0b2;color:var(--adj);}
.cbadge.verb{background:#e1bee7;color:var(--verb);}
.tbadge{font-size:.55rem;font-family:monospace;text-transform:uppercase;padding:.1rem .4rem;border-radius:100px;font-weight:700;}
.tbadge.regular  {background:#e8f5e9;color:#43a047;}
.tbadge.irregular{background:#ffebee;color:#e53935;}
.cword{font-size:clamp(.75rem,2vw,1rem);font-weight:900;line-height:1.2;word-break:break-word;}
.chint{font-size:clamp(.52rem,1.5vw,.65rem);color:var(--muted);font-style:italic;line-height:1.3;}
@keyframes shake{0%,100%{transform:rotateY(180deg) translateX(0)}20%,60%{transform:rotateY(180deg) translateX(-5px)}40%,80%{transform:rotateY(180deg) translateX(5px)}}
.cw.wrong .ci{animation:shake .4s ease;}

/* ── RESULTS ── */
#results{align-items:center;justify-content:center;padding:2rem;gap:1.5rem;}
.rcard{background:var(--white);border:2px solid var(--border);border-radius:18px;padding:2.5rem;width:100%;max-width:480px;text-align:center;display:flex;flex-direction:column;gap:1.4rem;box-shadow:0 4px 24px rgba(91,106,240,.10);}
.rtrophy{font-size:4rem;}
.rtitle{font-size:2rem;font-weight:900;letter-spacing:-1px;background:linear-gradient(135deg,var(--blue),var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.podium{display:flex;flex-direction:column;gap:.6rem;}
.prow{display:flex;align-items:center;background:var(--surface);border-radius:12px;padding:.8rem 1.2rem;border:2px solid var(--border);}
.prow.win{border-color:var(--green);background:var(--green-bg);}
.medal{font-size:1.2rem;width:28px;}
.pname{flex:1;text-align:left;font-weight:800;padding:0 .8rem;}
.pscore{font-family:monospace;font-weight:700;color:var(--blue);}
/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;}
.stat-box{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:.8rem .5rem;display:flex;flex-direction:column;align-items:center;gap:.2rem;}
.stat-val{font-size:1.4rem;font-weight:900;color:var(--blue);font-family:monospace;}
.stat-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-weight:700;}

/* ── TOAST ── */
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(80px);border-radius:100px;padding:.7rem 1.6rem;font-size:.9rem;font-weight:800;z-index:999;transition:transform .3s,opacity .3s;opacity:0;pointer-events:none;white-space:nowrap;border:2px solid transparent;}
#toast.on {transform:translateX(-50%) translateY(0);opacity:1;}
#toast.ok  {background:var(--green-bg);border-color:var(--green);color:#00a07a;}
#toast.err {background:var(--red-bg);  border-color:#ffc0c8;     color:var(--red);}
#toast.inf {background:var(--blue-bg); border-color:var(--noun-br);color:var(--blue);}
@media(max-width:480px){.grid{grid-template-columns:repeat(5,1fr);gap:.35rem;}.cword{font-size:.68rem;}.chint{font-size:.5rem;}}
</style>
</head>
<body>

<!-- ══ LOBBY ══ -->
<div id="lobby" class="screen on">
  <div class="logo"><h1>WordMatch</h1><p>English Memory Game</p></div>
  <div class="card">
    <h2>🎮 Solo / Local Game</h2>
    <div>
      <label>Your Name</label>
      <input type="text" id="solo-name" placeholder="Enter your name" maxlength="20">
    </div>
    <div>
      <label>Word Categories</label>
      <div class="cats">
        <button type="button" class="cat noun on" data-cat="nouns"><span>📘</span>Nouns</button>
        <button type="button" class="cat adj  on" data-cat="adjectives"><span>🟠</span>Adj</button>
        <button type="button" class="cat verb on" data-cat="verbs"><span>🟣</span>Verbs</button>
      </div>
    </div>
    <div>
      <label>Number of Pairs</label>
      <input type="number" id="pair-count" value="8" min="4" max="30">
    </div>
    <div>
      <label>Timer per turn (seconds, 0 = off)</label>
      <input type="number" id="turn-timer" value="30" min="0" max="120">
    </div>
    <button type="button" class="btn btn-blue" id="btn-solo">✨ Play Solo</button>
    <hr>
    <h2>🌐 Online Multiplayer</h2>
    <div>
      <label>Your Name</label>
      <input type="text" id="mp-name" placeholder="Enter your name" maxlength="20">
    </div>
    <button type="button" class="btn btn-green" id="btn-create">🏠 Create Room</button>
    <div class="join-row">
      <input type="text" id="room-code-input" placeholder="ROOM CODE" maxlength="6">
      <button type="button" class="btn btn-gray" id="btn-join" style="width:auto;padding:.8rem 1.2rem;">Join →</button>
    </div>
    <div id="fb-banner" style="display:none;background:var(--orange-bg);color:var(--orange);border:2px solid #ffe082;border-radius:10px;padding:.5rem 1rem;font-size:.8rem;font-weight:700;text-align:center;">
      ⚠️ Firebase not configured — online mode unavailable
    </div>
  </div>
</div>

<!-- ══ WAITING ══ -->
<div id="waiting" class="screen">
  <div style="text-align:center">
    <p style="font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:3px;margin-bottom:.5rem">Room Code</p>
    <div class="code-box" id="code-display">----</div>
    <div class="code-label">Tap to copy · share with friends</div>
  </div>
  <p style="font-size:.85rem;color:var(--muted);font-weight:700">Players in Room</p>
  <div class="plist" id="plist"></div>
  <p class="wmsg" id="wmsg">Waiting for players…</p>
  <div class="hbtns" id="hbtns">
    <button type="button" class="btn btn-green" id="btn-start">▶ Start Game</button>
    <button type="button" class="btn btn-red"   id="btn-leave-h">Leave Room</button>
  </div>
  <div class="gbtns" id="gbtns">
    <button type="button" class="btn btn-red" id="btn-leave-g">Leave Room</button>
  </div>
</div>

<!-- ══ GAME ══ -->
<div id="game" class="screen">
  <div class="ghead">
    <span class="gtitle">⚡ WordMatch</span>
    <div class="sbar-wrap">
      <div id="sbar"></div>
      <button type="button" class="btn btn-orange" id="btn-skip" disabled>⏭ Skip</button>
      <button type="button" class="btn btn-gray" id="btn-quit" style="width:auto;padding:.55rem 1rem;font-size:.88rem;">🏠 Quit</button>
    </div>
  </div>
  <div class="timer-wrap" id="timer-wrap" style="display:none">
    <span class="timer-label">Time</span>
    <span class="timer-val" id="timer-val">30</span>
    <div class="timer-bar-bg"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>
  </div>
  <div class="legend" id="legend"></div>
  <div class="tbanner mine" id="tbanner">✨ Your turn! Flip two cards.</div>
  <div class="grid" id="grid"></div>
</div>

<!-- ══ RESULTS ══ -->
<div id="results" class="screen">
  <div class="rcard">
    <div class="rtrophy" id="rtrophy">🏆</div>
    <div class="rtitle"  id="rtitle">You Win!</div>
    <div class="podium"  id="podium"></div>
    <div class="stats-grid" id="stats-grid"></div>
    <div style="display:flex;flex-direction:column;gap:.6rem;">
      <button type="button" class="btn btn-blue" id="btn-again">🔄 Play Again</button>
      <button type="button" class="btn btn-gray" id="btn-lobby">🏠 Back to Lobby</button>
    </div>
  </div>
</div>

<div id="toast"></div>

/* ════════════════════════════════════════════════
   HELPERS
   ════════════════════════════════════════════════ */
function show(id) {
  var all = document.querySelectorAll('.screen');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('on');
  document.getElementById(id).classList.add('on');
}

var toastT = null;
function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'on ' + (type || 'inf');
  clearTimeout(toastT);
  toastT = setTimeout(function() { t.className = ''; }, 2500);
}

function sanitize(s) { return s.replace(/[.#$\/\[\]]/g,'_'); }
function randCode() {
  var c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789', r='';
  for(var i=0;i<6;i++) r+=c[Math.floor(Math.random()*c.length)];
  return r;
}
function shuffle(a) {
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}
function catCls(c) { return c==='adjectives'?'adj':c==='nouns'?'noun':'verb'; }
function pad(n) { return n < 10 ? '0'+n : ''+n; }
function elapsed() { return Math.floor((Date.now() - gameStartTime) / 1000); }

/* ════════════════════════════════════════════════
   TOGGLE CATEGORY
   ════════════════════════════════════════════════ */
function toggleCat(btn) {
  var cat = btn.getAttribute('data-cat');
  var cnt = 0;
  var ks  = Object.keys(selCats);
  for(var i=0;i<ks.length;i++) if(selCats[ks[i]]) cnt++;
  if(btn.classList.contains('on')) {
    if(cnt<=1){toast('Select at least one category','err');return;}
    btn.classList.remove('on'); selCats[cat]=false;
  } else {
    btn.classList.add('on'); selCats[cat]=true;
  }
}

/* ════════════════════════════════════════════════
   BUILD DECK
   ════════════════════════════════════════════════ */
function buildDeck(cats, count) {
  var pool=[];
  for(var k=0;k<cats.length;k++){
    var list=WORDS[cats[k]]||[];
    for(var j=0;j<list.length;j++) pool.push({word:list[j].w,hint:list[j].h,match:list[j].m,mhint:list[j].mh,type:list[j].t,cat:cats[k]});
  }
  shuffle(pool);
  var pairs=pool.slice(0,count);
  var deck=[];
  for(var i=0;i<pairs.length;i++){
    var p=pairs[i];
    deck.push({word:p.word, hint:p.hint,  cat:p.cat, pid:i, side:'A', wt:p.type});
    deck.push({word:p.match,hint:p.mhint, cat:p.cat, pid:i, side:'B', wt:p.type});
  }
  return shuffle(deck);
}

function startSolo() {
  myName = document.getElementById('solo-name').value.trim();
  if(!myName){toast('Enter your name first','err');return;}
  pairCount = Math.max(4,Math.min(30,parseInt(document.getElementById('pair-count').value)||8));
  turnSecs  = Math.max(0,Math.min(120,parseInt(document.getElementById('turn-timer').value)||0));

  var cats = Object.keys(selCats).filter(function(k){return selCats[k];});
  cards   = buildDeck(cats, pairCount);
  flipped = []; matched = {}; moveCount = 0;
  scores  = {}; scores[sanitize(myName)] = 0;
  turnOrder = [sanitize(myName)]; turnIdx = 0;
  canFlip = true; onlineMode = false;
  gameStartTime = Date.now();

  show('game');
  renderBoard();
  renderScores();
  renderTurn();
  document.getElementById('btn-skip').disabled = false;
  startTurnTimer();
}

/* ════════════════════════════════════════════════
   ONLINE — CREATE ROOM
   ════════════════════════════════════════════════ */
function createRoom() {
  if(!db){toast('Firebase not configured','err');return;}
  myName = document.getElementById('mp-name').value.trim();
  if(!myName){toast('Enter your name','err');return;}
  pairCount = Math.max(4,Math.min(30,parseInt(document.getElementById('pair-count').value)||8));
  turnSecs  = Math.max(0,Math.min(120,parseInt(document.getElementById('turn-timer').value)||0));
  myRole='host'; roomCode=randCode();
  var cats = Object.keys(selCats).filter(function(k){return selCats[k];});
  var data = {host:sanitize(myName),status:'waiting',categories:cats,pairCount:pairCount,turnSecs:turnSecs,players:{}};
  data.players[sanitize(myName)] = {name:myName,score:0,role:'host'};
  db.ref('rooms/'+roomCode).set(data).then(function(){
    enterWaiting();
  }).catch(function(e){toast('Error: '+e.message,'err');});
}

/* ════════════════════════════════════════════════
   ONLINE — JOIN ROOM
   ════════════════════════════════════════════════ */
function joinRoom() {
  if(!db){toast('Firebase not configured','err');return;}
  myName = document.getElementById('mp-name').value.trim();
  var code = document.getElementById('room-code-input').value.trim().toUpperCase();
  if(!myName){toast('Enter your name','err');return;}
  if(code.length<4){toast('Enter a room code','err');return;}
  myRole='player'; roomCode=code;
  db.ref('rooms/'+code).once('value').then(function(snap){
    if(!snap.exists()){toast('Room not found','err');return;}
    var r=snap.val();
    if(r.status!=='waiting'){toast('Game already started','err');return;}
    db.ref('rooms/'+code+'/players/'+sanitize(myName)).set({name:myName,score:0,role:'player'});
    enterWaiting();
  }).catch(function(e){toast('Error: '+e.message,'err');});
}

/* ════════════════════════════════════════════════
   WAITING ROOM
   ════════════════════════════════════════════════ */
function enterWaiting() {
  inRoom=true; show('waiting');
  document.getElementById('code-display').textContent = roomCode;
  document.getElementById('hbtns').style.display = myRole==='host'?'flex':'none';
  document.getElementById('gbtns').style.display = myRole!=='host'?'block':'none';
  db.ref('rooms/'+roomCode).on('value',function(snap){
    if(!snap.exists()){leaveRoom();return;}
    var r=snap.val();
    var players=r.players||{};
    var pkeys=Object.keys(players);
    var list=document.getElementById('plist');
    list.innerHTML='';
    for(var i=0;i<pkeys.length;i++){
      var p=players[pkeys[i]];
      var chip=document.createElement('div');
      chip.className='pchip'+(p.name===myName?' me':'');
      chip.innerHTML='<div class="av">'+p.name[0].toUpperCase()+'</div><span>'+p.name+(p.role==='host'?' 👑':'')+'</span>';
      list.appendChild(chip);
    }
    document.getElementById('wmsg').textContent = pkeys.length<2?'Waiting for more players…':pkeys.length+' players ready! ✅';
    if(r.status==='playing') launchOnlineGame(r);
    if(r.status==='ended')   showResults(r.scores,r.winner,r.moveCount,r.duration);
  });
}

function copyCode() {
  if(navigator.clipboard){
    navigator.clipboard.writeText(roomCode).then(function(){toast('Copied: '+roomCode,'ok');});
  } else { toast('Code: '+roomCode,'inf'); }
}

/* ════════════════════════════════════════════════
   START ONLINE GAME (host)
   ════════════════════════════════════════════════ */
function startOnlineGame() {
  if(!db)return;
  db.ref('rooms/'+roomCode).once('value').then(function(snap){
    var r=snap.val();
    var players=r.players||{};
    var pkeys=Object.keys(players);
    if(pkeys.length<2){toast('Need at least 2 players!','err');return;}
    var cats=r.categories||['nouns','adjectives','verbs'];
    var deck=buildDeck(cats,r.pairCount||8);
    shuffle(pkeys);
    var sc={};
    for(var i=0;i<pkeys.length;i++) sc[pkeys[i]]=0;
    db.ref('rooms/'+roomCode).update({
      status:'playing',deck:deck,turnOrder:pkeys,turnIdx:0,
      flipped:[],matched:{},scores:sc,startTime:Date.now(),moveCount:0
    });
  });
}

/* ════════════════════════════════════════════════
   LAUNCH ONLINE GAME (all players)
   ════════════════════════════════════════════════ */
var _gameLoaded = false;
function launchOnlineGame(r) {
  if(_gameLoaded)return; _gameLoaded=true;
  cards=r.deck||[]; scores=r.scores||{};
  turnOrder=r.turnOrder||[]; turnIdx=r.turnIdx||0;
  matched=r.matched||{}; flipped=r.flipped||[];
  pairCount=r.pairCount||8; turnSecs=r.turnSecs||0;
  onlineMode=true; gameStartTime=r.startTime||Date.now();
  show('game'); renderBoard(); renderScores(); renderTurn();
  canFlip=isMyTurn()&&flipped.length<2;
  document.getElementById('btn-skip').disabled=!isMyTurn();
  startTurnTimer();
  db.ref('rooms/'+roomCode).on('value',function(snap){
    if(!snap.exists())return;
    var rv=snap.val();
    if(rv.status==='ended'){showResults(rv.scores,rv.winner,rv.moveCount,rv.duration);return;}
    if(rv.status!=='playing')return;
    scores=rv.scores||{}; turnOrder=rv.turnOrder||[];
    turnIdx=rv.turnIdx||0; matched=rv.matched||{}; flipped=rv.flipped||[];
    updateCards(); renderScores(); renderTurn();
    canFlip=isMyTurn()&&flipped.length<2;
    document.getElementById('btn-skip').disabled=!isMyTurn();
    if(isMyTurn()) startTurnTimer(); else stopTurnTimer();
  });
}

function isMyTurn() {
  return turnOrder.length>0 && turnOrder[turnIdx]===sanitize(myName);
}

/* ════════════════════════════════════════════════
   TIMER
   ════════════════════════════════════════════════ */
function startTurnTimer() {
  stopTurnTimer();
  if(!turnSecs) return;
  var wrap=document.getElementById('timer-wrap');
  wrap.style.display='flex';
  turnTimeLeft=turnSecs;
  renderTimerUI();
  timerInt=setInterval(function(){
    turnTimeLeft--;
    renderTimerUI();
    if(turnTimeLeft<=0){
      stopTurnTimer();
      toast("Time's up! Skipping turn…",'err');
      autoSkip();
    }
  },1000);
}

function stopTurnTimer() {
  clearInterval(timerInt); timerInt=null;
  var wrap=document.getElementById('timer-wrap');
  if(wrap) wrap.style.display='none';
}

function renderTimerUI() {
  var val=document.getElementById('timer-val');
  var bar=document.getElementById('timer-bar');
  if(!val||!bar)return;
  var pct=Math.max(0,(turnTimeLeft/turnSecs)*100);
  val.textContent=pad(turnTimeLeft);
  bar.style.width=pct+'%';
  var warn=turnTimeLeft<=10;
  val.className='timer-val'+(warn?' warn':'');
  bar.className='timer-bar'+(warn?' warn':'');
}

function autoSkip() {
  if(onlineMode){
    var next=(turnIdx+1)%turnOrder.length;
    db.ref('rooms/'+roomCode).update({flipped:[],turnIdx:next});
  } else {
    flipped=[]; updateCards();
    canFlip=true;
    document.getElementById('btn-skip').disabled=false;
    startTurnTimer();
  }
}

/* ════════════════════════════════════════════════
   RENDER BOARD
   ════════════════════════════════════════════════ */
function renderBoard() {
  var catLabels={nouns:'Noun',adjectives:'Adj',verbs:'Verb'};
  var grid=document.getElementById('grid');
  grid.innerHTML='';
  var leg=document.getElementById('legend');
  var activeCats={};
  for(var x=0;x<cards.length;x++) activeCats[cards[x].cat]=true;
  leg.innerHTML='';
  var cnames=Object.keys(activeCats);
  for(var ci=0;ci<cnames.length;ci++){
    var cls=catCls(cnames[ci]);
    leg.innerHTML+='<span><span class="dot '+cls+'"></span>'+catLabels[cnames[ci]]+'</span>';
  }
  leg.innerHTML+='<span><span class="dot reg"></span>Regular</span>';
  leg.innerHTML+='<span><span class="dot irr"></span>Irregular</span>';
  for(var i=0;i<cards.length;i++){
    (function(idx){
      var card=cards[idx];
      var cls=catCls(card.cat);
      var wrap=document.createElement('div');
      wrap.className='cw';
      if(matched[card.pid])              wrap.classList.add('matched','flipped');
      else if(flipped.indexOf(idx)>=0)   wrap.classList.add('flipped');
      wrap.innerHTML=
        '<div class="ci">'+
          '<div class="cf cb"><div class="cb-ico">🃏</div></div>'+
          '<div class="cf '+cls+'">'+
            '<span class="cbadge '+cls+'">'+catLabels[card.cat]+'</span>'+
            '<span class="tbadge '+card.wt+'">'+card.wt+'</span>'+
            '<span class="cword">'+card.word+'</span>'+
            '<span class="chint">'+card.hint+'</span>'+
          '</div>'+
        '</div>';
      wrap.addEventListener('click',function(){flipCard(idx);});
      grid.appendChild(wrap);
    })(i);
  }
}

function updateCards() {
  var wraps=document.querySelectorAll('.cw');
  for(var i=0;i<wraps.length;i++){
    var c=cards[i];
    wraps[i].classList.remove('flipped','matched','wrong');
    if(matched[c.pid])               wraps[i].classList.add('matched','flipped');
    else if(flipped.indexOf(i)>=0)   wraps[i].classList.add('flipped');
  }
}

function renderScores() {
  var bar=document.getElementById('sbar');
  bar.innerHTML='';
  var mySan=sanitize(myName);
  var keys=Object.keys(scores).sort(function(a,b){return scores[b]-scores[a];});
  for(var i=0;i<keys.length;i++){
    var k=keys[i];
    var isTurn=turnOrder.length>0&&turnOrder[turnIdx]===k;
    var pill=document.createElement('div');
    pill.className='spill'+(isTurn?' turn':'');
    pill.innerHTML=(k===mySan?'👤 ':'👥 ')+k+' <span class="pts">'+scores[k]+'</span>';
    bar.appendChild(pill);
  }
}

function renderTurn() {
  var banner=document.getElementById('tbanner');
  if(onlineMode){
    var who=turnOrder[turnIdx]||'';
    if(who===sanitize(myName)){
      banner.textContent='✨ Your turn! Flip two cards.';
      banner.className='tbanner mine';
    } else {
      banner.textContent='⏳ '+who+"'s turn…";
      banner.className='tbanner theirs';
    }
  } else {
    banner.textContent='✨ Your turn! Flip two cards.';
    banner.className='tbanner mine';
  }
}

/* ════════════════════════════════════════════════
   FLIP CARD
   ════════════════════════════════════════════════ */
function flipCard(idx) {
  if(!canFlip)return;
  if(matched[cards[idx].pid])return;
  if(flipped.indexOf(idx)>=0)return;
  if(onlineMode&&!isMyTurn()){toast("Not your turn!",'err');return;}

  moveCount++;
  flipped.push(idx);
  var wraps=document.querySelectorAll('.cw');
  wraps[idx].classList.add('flipped');
  document.getElementById('btn-skip').disabled=true;

  if(onlineMode) db.ref('rooms/'+roomCode).update({flipped:flipped,moveCount:moveCount});

  if(flipped.length<2)return;
  canFlip=false;
  stopTurnTimer();

  var i1=flipped[0],i2=flipped[1];
  var c1=cards[i1],c2=cards[i2];

  setTimeout(function(){
    if(c1.pid===c2.pid&&c1.side!==c2.side){
      /* ✅ MATCH */
      matched[c1.pid]=true;
      var mySan=sanitize(myName);
      scores[mySan]=(scores[mySan]||0)+1;
      if(onlineMode) db.ref('rooms/'+roomCode+'/matched/'+c1.pid).set(true);
      flipped=[];
      updateCards(); renderScores();
      canFlip=true;
      document.getElementById('btn-skip').disabled=false;
      var totalMatched=Object.keys(matched).length;
      if(totalMatched>=pairCount){
        var dur=elapsed();
        if(onlineMode){
          var winner=Object.keys(scores).sort(function(a,b){return scores[b]-scores[a];})[0];
          db.ref('rooms/'+roomCode).update({status:'ended',scores:scores,winner:winner,moveCount:moveCount,duration:dur});
        } else {
          setTimeout(function(){showResults(scores,mySan,moveCount,dur);},400);
        }
      } else {
        toast('Match! Keep going! 🎉','ok');
        if(onlineMode){
          db.ref('rooms/'+roomCode).update({flipped:[],scores:scores});
          startTurnTimer();
        } else { startTurnTimer(); }
      }
    } else {
      /* ❌ NO MATCH */
      var w1=wraps[i1],w2=wraps[i2];
      if(w1)w1.classList.add('wrong');
      if(w2)w2.classList.add('wrong');
      setTimeout(function(){
        if(w1){w1.classList.remove('flipped','wrong');}
        if(w2){w2.classList.remove('flipped','wrong');}
        flipped=[];
        if(onlineMode){
          var next=(turnIdx+1)%turnOrder.length;
          db.ref('rooms/'+roomCode).update({flipped:[],turnIdx:next,scores:scores});
        } else {
          canFlip=true;
          document.getElementById('btn-skip').disabled=false;
          startTurnTimer();
        }
      },800);
    }
  },900);
}

/* ════════════════════════════════════════════════
   SKIP
   ════════════════════════════════════════════════ */
function skipTurn() {
  if(!canFlip)return;
  stopTurnTimer();
  flipped=[];
  if(onlineMode){
    var next=(turnIdx+1)%turnOrder.length;
    db.ref('rooms/'+roomCode).update({flipped:[],turnIdx:next});
  } else {
    updateCards();
    canFlip=true;
    document.getElementById('btn-skip').disabled=false;
    startTurnTimer();
  }
  toast('Turn skipped','inf');
}

/* ════════════════════════════════════════════════
   RESULTS
   ════════════════════════════════════════════════ */
function showResults(sc, winner, moves, dur) {
  if(document.getElementById('results').classList.contains('on'))return;
  stopTurnTimer();
  if(db&&inRoom) db.ref('rooms/'+roomCode).off();
  show('results'); _gameLoaded=false;

  var mySan=sanitize(myName);
  var iWon=(winner===mySan);
  document.getElementById('rtrophy').textContent = iWon?'🏆':'🎮';
  document.getElementById('rtitle').textContent  = iWon?'You Win! 🎉':(winner||'?')+' Wins!';

  /* podium */
  var keys=Object.keys(sc||{}).sort(function(a,b){return (sc[b]||0)-(sc[a]||0);});
  var medals=['🥇','🥈','🥉'];
  var pod=document.getElementById('podium');
  pod.innerHTML='';
  for(var i=0;i<keys.length;i++){
    var row=document.createElement('div');
    row.className='prow'+(i===0?' win':'');
    row.innerHTML='<span class="medal">'+(medals[i]||'')+'</span><span class="pname">'+keys[i]+'</span><span class="pscore">'+sc[keys[i]]+' pts</span>';
    pod.appendChild(row);
  }

  /* stats */
  var mins=Math.floor((dur||0)/60);
  var secs=(dur||0)%60;
  var timeStr=mins>0?mins+'m '+pad(secs)+'s':pad(secs)+'s';
  var accuracy=moves>0?Math.round((pairCount/moves)*100)+'%':'—';
  var sg=document.getElementById('stats-grid');
  sg.innerHTML=
    '<div class="stat-box"><span class="stat-val">'+(sc[mySan]||0)+'</span><span class="stat-lbl">Pairs Found</span></div>'+
    '<div class="stat-box"><span class="stat-val">'+(moves||0)+'</span><span class="stat-lbl">Total Moves</span></div>'+
    '<div class="stat-box"><span class="stat-val">'+timeStr+'</span><span class="stat-lbl">Time</span></div>'+
    '<div class="stat-box"><span class="stat-val">'+accuracy+'</span><span class="stat-lbl">Accuracy</span></div>'+
    '<div class="stat-box"><span class="stat-val">'+pairCount+'</span><span class="stat-lbl">Total Pairs</span></div>'+
    '<div class="stat-box"><span class="stat-val">'+(iWon?'🏆':'🎮')+'</span><span class="stat-lbl">Result</span></div>';
}

function playAgain() {
  _gameLoaded=false; stopTurnTimer();
  if(onlineMode&&myRole==='host'){
    db.ref('rooms/'+roomCode).update({status:'waiting',deck:null,scores:null,matched:null,flipped:null,winner:null,moveCount:null,duration:null});
    show('waiting');
  } else if(onlineMode){
    show('waiting');
  } else {
    startSolo();
  }
}

function leaveRoom() {
  stopTurnTimer(); _gameLoaded=false; onlineMode=false;
  if(db&&inRoom&&roomCode){
    db.ref('rooms/'+roomCode).off();
    if(myRole==='host') db.ref('rooms/'+roomCode+'/status').set('ended');
    else db.ref('rooms/'+roomCode+'/players/'+sanitize(myName)).remove();
  }
  inRoom=false;roomCode='';myRole='';
  cards=[];flipped=[];matched={};scores={};turnOrder=[];
  show('lobby');
}
