<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WordMatch</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f4ff; --white:#fff; --surface:#f8f9ff;
  --blue:#5b6af0; --blue2:#7c8cf8; --blue-bg:#eef0ff;
  --green:#00c48c; --green-bg:#e8faf3;
  --red:#f0556a; --red-bg:#fff0f2;
  --orange:#f57c00; --orange-bg:#fff8e1;
  --purple:#7b1fa2; --purple-bg:#f3e5f5;
  --muted:#7880aa; --text:#1a1d3a; --border:#e0e4f5;
  --noun:#2196f3; --noun-bg:#e3f2fd; --noun-br:#90caf9;
  --adj:#f57c00;  --adj-bg:#fff3e0;  --adj-br:#ffb74d;
  --verb:#7b1fa2; --verb-bg:#f3e5f5; --verb-br:#ce93d8;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* SCREENS */
.screen { display:none; }
.screen.on { display:flex; flex-direction:column; min-height:100vh; }

/* LOBBY */
#lobby { align-items:center; justify-content:center; padding:2rem 1rem; gap:1.5rem; }
.logo h1 {
  font-size:clamp(2.5rem,8vw,4.5rem); font-weight:900; letter-spacing:-2px; text-align:center;
  background:linear-gradient(135deg,#5b6af0,#f0556a,#00c48c);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.logo p { text-align:center; color:var(--muted); font-size:.85rem; letter-spacing:3px; text-transform:uppercase; margin-top:.3rem; }
.card {
  background:var(--white); border:2px solid var(--border); border-radius:18px;
  padding:2rem; width:100%; max-width:440px;
  display:flex; flex-direction:column; gap:1.1rem;
  box-shadow:0 4px 24px rgba(91,106,240,.10);
}
.card h2 { font-size:1.1rem; font-weight:800; color:var(--blue); }
label { display:block; font-size:.72rem; text-transform:uppercase; letter-spacing:2px; color:var(--muted); font-weight:700; margin-bottom:.35rem; }
input[type=text], input[type=number] {
  width:100%; background:var(--surface); border:2px solid var(--border); border-radius:10px;
  padding:.8rem 1rem; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; color:var(--text);
  outline:none;
}
input:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(91,106,240,.12); }
input::placeholder { color:#b0b8d4; font-weight:600; }
.cats { display:grid; grid-template-columns:repeat(3,1fr); gap:.5rem; }
.cat {
  padding:.7rem .4rem; border-radius:10px; border:2px solid var(--border);
  background:var(--surface); cursor:pointer; font-family:'Nunito',sans-serif;
  font-size:.82rem; font-weight:800; color:var(--muted);
  display:flex; flex-direction:column; align-items:center; gap:.3rem;
}
.cat span { font-size:1.3rem; }
.cat.on.noun { border-color:var(--noun); background:var(--noun-bg); color:var(--noun); }
.cat.on.adj  { border-color:var(--adj);  background:var(--adj-bg);  color:var(--adj);  }
.cat.on.verb { border-color:var(--verb); background:var(--verb-bg); color:var(--verb); }
hr { border:none; border-top:2px solid var(--border); }
.btn {
  width:100%; padding:.85rem; border-radius:12px; border:none; cursor:pointer;
  font-family:'Nunito',sans-serif; font-size:1rem; font-weight:800;
  display:flex; align-items:center; justify-content:center; gap:.5rem;
}
.btn-blue   { background:linear-gradient(135deg,#5b6af0,#7c8cf8); color:#fff; box-shadow:0 4px 18px rgba(91,106,240,.30); }
.btn-green  { background:linear-gradient(135deg,#00c48c,#00e0a0); color:#fff; box-shadow:0 4px 18px rgba(0,196,140,.30); }
.btn-gray   { background:var(--surface); color:var(--text); border:2px solid var(--border); }
.btn-red    { background:var(--red-bg); color:var(--red); border:2px solid #ffc0c8; }
.btn-orange { background:var(--orange-bg); color:var(--orange); border:2px solid #ffe082; font-size:.88rem; padding:.6rem 1rem; width:auto; }
.btn:disabled { opacity:.35; cursor:not-allowed; }
.row { display:flex; gap:.6rem; }
.row input { flex:1; text-transform:uppercase; letter-spacing:4px; text-align:center; font-size:1.1rem; }

/* STATUS BANNER */
#status-banner {
  display:none; background:var(--orange-bg); color:var(--orange);
  border:2px solid #ffe082; border-radius:10px;
  padding:.5rem 1rem; font-size:.8rem; font-weight:700; text-align:center;
}

/* WAITING */
#waiting { align-items:center; justify-content:center; padding:2rem; gap:1.5rem; }
.code-box {
  font-family:monospace; font-size:clamp(2rem,10vw,3.5rem); font-weight:700;
  color:var(--blue); background:var(--white); padding:1rem 2.5rem;
  border-radius:18px; border:2px solid var(--noun-br);
  letter-spacing:10px; cursor:pointer;
  box-shadow:0 0 0 6px rgba(91,106,240,.06);
}
.code-label { font-size:.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:2px; text-align:center; margin-top:.4rem; }
.plist { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:.7rem; width:100%; max-width:500px; }
.pchip {
  background:var(--white); border:2px solid var(--border); border-radius:12px;
  padding:.7rem 1rem; display:flex; align-items:center; gap:.6rem;
  font-size:.9rem; font-weight:700;
}
.av {
  width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--blue),var(--red));
  color:#fff; display:flex; align-items:center; justify-content:center;
  font-size:1rem; font-weight:900; flex-shrink:0;
}
.pchip.me { border-color:var(--blue); background:var(--blue-bg); }
.wmsg { color:var(--muted); font-size:.9rem; font-weight:700; text-align:center; }
.hbtns { display:none; flex-direction:column; gap:.6rem; width:100%; max-width:300px; }
.gbtns { display:none; }

/* GAME */
#game { padding:1rem; gap:.7rem; max-width:980px; margin:0 auto; width:100%; }
.ghead { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:.5rem; }
.gtitle { font-size:1.2rem; font-weight:900; color:var(--blue); }
.sbar { display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; }
.spill {
  background:var(--white); border:2px solid var(--border); border-radius:100px;
  padding:.4rem 1rem; font-size:.85rem; font-weight:800;
  display:flex; align-items:center; gap:.45rem;
}
.spill.turn { border-color:var(--blue); background:var(--blue-bg); }
.spill .pts { font-family:monospace; color:var(--blue); font-weight:700; }
.legend { display:flex; gap:1rem; flex-wrap:wrap; font-size:.73rem; color:var(--muted); font-weight:700; }
.legend span { display:flex; align-items:center; gap:.3rem; }
.dot { width:9px; height:9px; border-radius:50%; display:inline-block; }
.dot.noun{background:var(--noun);} .dot.adj{background:var(--adj);} .dot.verb{background:var(--verb);}
.dot.reg{background:#43a047;} .dot.irr{background:#e53935;}
.tbanner {
  text-align:center; padding:.65rem 1rem; border-radius:12px;
  font-size:.95rem; font-weight:800; border:2px solid var(--border); background:var(--white);
}
.tbanner.mine { border-color:var(--blue); background:var(--blue-bg); color:var(--blue); }
.tbanner.theirs { color:var(--muted); }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(88px,1fr)); gap:.55rem; }
.cw { aspect-ratio:2/3; perspective:800px; cursor:pointer; }
.cw.matched { pointer-events:none; }
.ci {
  position:relative; width:100%; height:100%;
  transform-style:preserve-3d;
  transition:transform .45s cubic-bezier(.34,1.15,.64,1);
}
.cw.flipped .ci, .cw.matched .ci { transform:rotateY(180deg); }
.cf {
  position:absolute; inset:0; border-radius:14px;
  backface-visibility:hidden;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:.5rem; border:2px solid transparent; gap:.3rem; text-align:center;
}
.cb {
  background:linear-gradient(135deg,#5b6af0,#7c8cf8);
  overflow:hidden;
}
.cb::before {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(45deg,transparent,transparent 10px,rgba(255,255,255,.06) 10px,rgba(255,255,255,.06) 11px);
}
.cb-ico { font-size:1.8rem; position:relative; z-index:1; }
.cf.noun { border-color:var(--noun-br); background:var(--noun-bg); transform:rotateY(180deg); }
.cf.adj  { border-color:var(--adj-br);  background:var(--adj-bg);  transform:rotateY(180deg); }
.cf.verb { border-color:var(--verb-br); background:var(--verb-bg); transform:rotateY(180deg); }
.cw.matched .cf { background:var(--green-bg)!important; border-color:var(--green)!important; }
.cw.matched .cword { color:#00a07a; }
.cbadge {
  font-size:.58rem; font-family:monospace; text-transform:uppercase; letter-spacing:1px;
  padding:.12rem .45rem; border-radius:100px; font-weight:700;
}
.cbadge.noun{background:#bbdefb;color:var(--noun);}
.cbadge.adj {background:#ffe0b2;color:var(--adj);}
.cbadge.verb{background:#e1bee7;color:var(--verb);}
.tbadge {
  font-size:.55rem; font-family:monospace; text-transform:uppercase;
  padding:.1rem .4rem; border-radius:100px; font-weight:700;
}
.tbadge.regular   {background:#e8f5e9;color:#43a047;}
.tbadge.irregular {background:#ffebee;color:#e53935;}
.cword { font-size:clamp(.75rem,2vw,1rem); font-weight:900; line-height:1.2; word-break:break-word; }
.chint { font-size:clamp(.52rem,1.5vw,.65rem); color:var(--muted); font-style:italic; line-height:1.3; }
@keyframes shake {
  0%,100%{transform:rotateY(180deg) translateX(0)}
  20%,60%{transform:rotateY(180deg) translateX(-5px)}
  40%,80%{transform:rotateY(180deg) translateX(5px)}
}
.cw.wrong .ci { animation:shake .4s ease; }

/* RESULTS */
#results { align-items:center; justify-content:center; padding:2rem; gap:1.5rem; }
.rcard {
  background:var(--white); border:2px solid var(--border); border-radius:18px;
  padding:2.5rem; width:100%; max-width:460px; text-align:center;
  display:flex; flex-direction:column; gap:1.4rem;
  box-shadow:0 4px 24px rgba(91,106,240,.10);
}
.rtrophy { font-size:4rem; }
.rtitle {
  font-size:2rem; font-weight:900; letter-spacing:-1px;
  background:linear-gradient(135deg,var(--blue),var(--red));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.podium { display:flex; flex-direction:column; gap:.6rem; }
.prow {
  display:flex; align-items:center; background:var(--surface);
  border-radius:12px; padding:.8rem 1.2rem; border:2px solid var(--border);
}
.prow.win { border-color:var(--green); background:var(--green-bg); }
.prow .medal { font-size:1.2rem; width:28px; }
.prow .pname { flex:1; text-align:left; font-weight:800; padding:0 .8rem; }
.prow .pscore { font-family:monospace; font-weight:700; color:var(--blue); }

/* TOAST */
#toast {
  position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(80px);
  border-radius:100px; padding:.7rem 1.6rem;
  font-size:.9rem; font-weight:800; z-index:999;
  transition:transform .3s, opacity .3s; opacity:0; pointer-events:none; white-space:nowrap;
  border:2px solid transparent;
}
#toast.on { transform:translateX(-50%) translateY(0); opacity:1; }
#toast.ok  { background:var(--green-bg); border-color:var(--green); color:#00a07a; }
#toast.err { background:var(--red-bg);   border-color:#ffc0c8;      color:var(--red); }
#toast.inf { background:var(--blue-bg);  border-color:var(--noun-br);color:var(--blue); }

@media(max-width:480px){
  .grid{grid-template-columns:repeat(5,1fr);gap:.35rem;}
  .cword{font-size:.68rem;} .chint{font-size:.5rem;}
}
</style>
</head>
<body>

<!-- LOBBY -->
<div id="lobby" class="screen on">
  <div class="logo"><h1>WordMatch</h1><p>English Memory Game</p></div>
  <div class="card">
    <h2>🎮 Create a Room</h2>
    <div>
      <label>Your Name</label>
      <input type="text" id="host-name" placeholder="Enter your name" maxlength="20">
    </div>
    <div>
      <label>Word Categories</label>
      <div class="cats">
        <button type="button" class="cat noun on" data-cat="nouns"><span>📘</span>Nouns</button>
        <button type="button" class="cat adj  on" data-cat="adjectives"><span>🟠</span>Adjectives</button>
        <button type="button" class="cat verb on" data-cat="verbs"><span>🟣</span>Verbs</button>
      </div>
    </div>
    <div>
      <label>Number of Pairs</label>
      <input type="number" id="pair-count" value="8" min="4" max="30">
    </div>
    <button type="button" class="btn btn-blue" id="btn-create">✨ Create Room</button>
    <div id="status-banner">⚡ Firebase not configured — playing in Solo Mode</div>
    <hr>
    <h2>🔗 Join a Room</h2>
    <div>
      <label>Your Name</label>
      <input type="text" id="join-name" placeholder="Enter your name" maxlength="20">
    </div>
    <div class="row">
      <input type="text" id="room-code" placeholder="ROOM CODE" maxlength="6">
      <button type="button" class="btn btn-gray" id="btn-join" style="width:auto;padding:.8rem 1.2rem">Join →</button>
    </div>
  </div>
</div>

<!-- WAITING -->
<div id="waiting" class="screen">
  <div style="text-align:center">
    <p style="font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:3px;margin-bottom:.5rem">Room Code</p>
    <div class="code-box" id="code-display">----</div>
    <div class="code-label">Tap to copy · share with friends</div>
  </div>
  <p style="font-size:.85rem;color:var(--muted);font-weight:700">Players in Room</p>
  <div class="plist" id="plist"></div>
  <p class="wmsg" id="wmsg">Waiting for players…</p>
  <div class="hbtns" id="hbtns">
    <button type="button" class="btn btn-green" id="btn-start">▶ Start Game</button>
    <button type="button" class="btn btn-red"   id="btn-leave-h">Leave Room</button>
  </div>
  <div class="gbtns" id="gbtns">
    <button type="button" class="btn btn-red" id="btn-leave-g">Leave Room</button>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="ghead">
    <span class="gtitle">⚡ WordMatch</span>
    <div class="sbar">
      <div id="sbar"></div>
      <button type="button" class="btn btn-orange" id="btn-skip" disabled>⏭ Skip</button>
    </div>
  </div>
  <div class="legend" id="legend"></div>
  <div class="tbanner" id="tbanner">Waiting…</div>
  <div class="grid" id="grid"></div>
</div>

<!-- RESULTS -->
<div id="results" class="screen">
  <div class="rcard">
    <div class="rtrophy" id="rtrophy">🏆</div>
    <div class="rtitle" id="rtitle">Game Over!</div>
    <div class="podium" id="podium"></div>
    <div style="display:flex;flex-direction:column;gap:.6rem">
      <button type="button" class="btn btn-blue"  id="btn-again">🔄 Play Again</button>
      <button type="button" class="btn btn-gray"  id="btn-lobby">🏠 Back to Lobby</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-app.js" onerror="console.warn('firebase-app failed')"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@8.10.1/firebase-database.js" onerror="console.warn('firebase-db failed')"></script>
<script>

// ── STATE ────────────────────────────────────────
var db         = null;
var inRoom     = false;
var roomCode   = '';
var myName     = '';
var myRole     = '';
var localMode  = false;
var gameLoaded = false;
var selectedCats = {nouns:true, adjectives:true, verbs:true};
var pairCount  = 8;
var cards      = [];
var flipped    = [];
var matched    = {};
var scores     = {};
var turnOrder  = [];
var turnIdx    = 0;
var canFlip    = false;

// ── HELPERS ──────────────────────────────────────
function show(id) {
  var all = document.querySelectorAll('.screen');
  for (var i=0; i<all.length; i++) all[i].classList.remove('on');
  document.getElementById(id).classList.add('on');
}

var toastTimer = null;
function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'on ' + (type || 'inf');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.className = ''; }, 2800);
}

function sanitize(s) {
  return s.replace(/[.#$\/\[\]]/g, '_');
}

function randCode() {
  var chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  var code = '';
  for (var i=0; i<6; i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}

function shuffle(arr) {
  for (var i=arr.length-1; i>0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
  }
  return arr;
}

function catCls(category) {
  if (category === 'adjectives') return 'adj';
  if (category === 'nouns')      return 'noun';
  return 'verb';
}

// ── TOGGLE CATEGORY ──────────────────────────────
function toggleCat(btn) {
  var cat = btn.getAttribute('data-cat');
  var active = Object.keys(selectedCats).filter(function(k){ return selectedCats[k]; });
  if (btn.classList.contains('on')) {
    if (active.length <= 1) { toast('Select at least one category', 'err'); return; }
    btn.classList.remove('on');
    selectedCats[cat] = false;
  } else {
    btn.classList.add('on');
    selectedCats[cat] = true;
  }
}

// ── BUILD DECK ───────────────────────────────────
function buildDeck(cats, count) {
  var pool = [];
  for (var i=0; i<cats.length; i++) {
    var c = cats[i];
    var words = WORDS[c] || [];
    for (var j=0; j<words.length; j++) {
      pool.push({word:words[j].word, hint:words[j].hint, match:words[j].match, mhint:words[j].mhint, type:words[j].type, category:c});
    }
  }
  shuffle(pool);
  var pairs = pool.slice(0, count);
  var deck = [];
  for (var k=0; k<pairs.length; k++) {
    var p = pairs[k];
    deck.push({id:'A'+k, word:p.word,  hint:p.hint,  category:p.category, pairId:k, side:'A', wtype:p.type});
    deck.push({id:'B'+k, word:p.match, hint:p.mhint, category:p.category, pairId:k, side:'B', wtype:p.type});
  }
  shuffle(deck);
  return deck;
}

// ── CREATE ROOM ──────────────────────────────────
function createRoom() {
  var name = document.getElementById('host-name').value.trim();
  if (!name) { toast('Enter your name first', 'err'); return; }
  var pc = parseInt(document.getElementById('pair-count').value) || 8;
  pairCount = Math.max(4, Math.min(30, pc));
  myName = name;
  myRole = 'host';

  if (!db) {
    roomCode = 'LOCAL';
    startLocalGame();
    return;
  }

  roomCode = randCode();
  var cats = Object.keys(selectedCats).filter(function(k){ return selectedCats[k]; });
  db.ref('rooms/' + roomCode).set({
    host: sanitize(name),
    status: 'waiting',
    categories: cats,
    pairCount: pairCount,
    players: {}
  }).then(function() {
    db.ref('rooms/' + roomCode + '/players/' + sanitize(name)).set({name:name, score:0, role:'host'});
    enterWaiting();
  }).catch(function(e) {
    toast('Firebase error: ' + e.message, 'err');
  });
}

// ── JOIN ROOM ────────────────────────────────────
function joinRoom() {
  var name = document.getElementById('join-name').value.trim();
  var code = document.getElementById('room-code').value.trim().toUpperCase();
  if (!name) { toast('Enter your name first', 'err'); return; }
  if (code.length < 4) { toast('Enter a room code', 'err'); return; }
  if (!db) { toast('Firebase not configured', 'err'); return; }

  myName = name; myRole = 'player'; roomCode = code;
  db.ref('rooms/' + code).once('value').then(function(snap) {
    if (!snap.exists()) { toast('Room not found', 'err'); return; }
    var room = snap.val();
    if (room.status !== 'waiting') { toast('Game already started', 'err'); return; }
    db.ref('rooms/' + code + '/players/' + sanitize(name)).set({name:name, score:0, role:'player'});
    enterWaiting();
  }).catch(function(e) {
    toast('Error: ' + e.message, 'err');
  });
}

// ── ENTER WAITING ROOM ───────────────────────────
function enterWaiting() {
  inRoom = true;
  show('waiting');
  document.getElementById('code-display').textContent = roomCode;
  document.getElementById('hbtns').style.display = myRole === 'host' ? 'flex' : 'none';
  document.getElementById('gbtns').style.display = myRole !== 'host' ? 'block' : 'none';

  db.ref('rooms/' + roomCode).on('value', function(snap) {
    if (!snap.exists()) { leaveRoom(); return; }
    var room = snap.val();
    var players = room.players || {};
    var pkeys = Object.keys(players);
    var list = document.getElementById('plist');
    list.innerHTML = '';
    for (var i=0; i<pkeys.length; i++) {
      var p = players[pkeys[i]];
      var chip = document.createElement('div');
      chip.className = 'pchip' + (p.name === myName ? ' me' : '');
      chip.innerHTML = '<div class="av">' + p.name[0].toUpperCase() + '</div><span>' + p.name + (p.role === 'host' ? ' 👑' : '') + '</span>';
      list.appendChild(chip);
    }
    var cnt = pkeys.length;
    document.getElementById('wmsg').textContent = cnt < 2 ? 'Waiting for more players…' : cnt + ' players ready!';
    if (room.status === 'playing') loadOnlineGame(room);
    if (room.status === 'ended')   showResults(room.scores, room.winner);
  });
}

// ── START GAME (host) ────────────────────────────
function startGame() {
  if (!db) return;
  db.ref('rooms/' + roomCode).once('value').then(function(snap) {
    var room = snap.val();
    var players = room.players || {};
    var pkeys = Object.keys(players);
    if (pkeys.length < 2) { toast('Need at least 2 players!', 'err'); return; }

    var cats = room.categories || ['nouns','adjectives','verbs'];
    var deck = buildDeck(cats, room.pairCount || 8);
    shuffle(pkeys);

    var sc = {};
    for (var i=0; i<pkeys.length; i++) sc[pkeys[i]] = 0;

    db.ref('rooms/' + roomCode).update({
      status: 'playing',
      deck: deck,
      turnOrder: pkeys,
      turnIdx: 0,
      flipped: [],
      matched: {},
      scores: sc
    });
  });
}

// ── LOCAL GAME ───────────────────────────────────
function startLocalGame() {
  var cats = Object.keys(selectedCats).filter(function(k){ return selectedCats[k]; });
  cards = buildDeck(cats, pairCount);
  scores = {}; scores[sanitize(myName)] = 0;
  turnOrder = [sanitize(myName)];
  turnIdx = 0;
  matched = {};
  flipped = [];
  canFlip = true;
  localMode = true;
  gameLoaded = true;
  show('game');
  renderBoard();
  renderScores();
  renderTurn();
  renderSkip();
}

// ── ONLINE GAME ──────────────────────────────────
function loadOnlineGame(room) {
  if (gameLoaded) return;
  gameLoaded = true;
  cards     = room.deck || [];
  scores    = room.scores || {};
  turnOrder = room.turnOrder || [];
  turnIdx   = room.turnIdx || 0;
  matched   = room.matched || {};
  flipped   = room.flipped || [];
  pairCount = room.pairCount || 8;

  show('game');
  renderBoard();
  renderScores();
  renderTurn();
  renderSkip();
  canFlip = isMyTurn() && flipped.length < 2;

  db.ref('rooms/' + roomCode).on('value', function(snap) {
    if (!snap.exists()) return;
    var r = snap.val();
    if (r.status === 'ended')   { showResults(r.scores, r.winner); return; }
    if (r.status !== 'playing') return;
    scores    = r.scores    || {};
    turnOrder = r.turnOrder || [];
    turnIdx   = r.turnIdx   || 0;
    matched   = r.matched   || {};
    flipped   = r.flipped   || [];
    updateCards();
    renderScores();
    renderTurn();
    renderSkip();
    canFlip = isMyTurn() && flipped.length < 2;
  });
}

function isMyTurn() {
  return turnOrder[turnIdx] === sanitize(myName);
}

// ── RENDER BOARD ─────────────────────────────────
function renderBoard() {
  var grid = document.getElementById('grid');
  grid.innerHTML = '';

  var leg = document.getElementById('legend');
  var activeCats = {};
  for (var x=0; x<cards.length; x++) activeCats[cards[x].category] = true;
  var catLabels = {nouns:'Noun', adjectives:'Adj', verbs:'Verb'};
  leg.innerHTML = '';
  var cnames = Object.keys(activeCats);
  for (var ci=0; ci<cnames.length; ci++) {
    var cls = catCls(cnames[ci]);
    leg.innerHTML += '<span><span class="dot ' + cls + '"></span>' + catLabels[cnames[ci]] + '</span>';
  }
  leg.innerHTML += '<span><span class="dot reg"></span>Regular</span>';
  leg.innerHTML += '<span><span class="dot irr"></span>Irregular</span>';

  for (var i=0; i<cards.length; i++) {
    (function(idx) {
      var card = cards[idx];
      var cls  = catCls(card.category);
      var wrap = document.createElement('div');
      wrap.className = 'cw';
      wrap.setAttribute('data-idx', idx);
      if (matched[String(card.pairId)])  wrap.classList.add('matched', 'flipped');
      else if (flipped.indexOf(idx) >= 0) wrap.classList.add('flipped');
      wrap.innerHTML =
        '<div class="ci">' +
          '<div class="cf cb"><div class="cb-ico">🃏</div></div>' +
          '<div class="cf ' + cls + '">' +
            '<span class="cbadge ' + cls + '">' + (catLabels[card.category]||cls) + '</span>' +
            '<span class="tbadge ' + card.wtype + '">' + card.wtype + '</span>' +
            '<span class="cword">' + card.word + '</span>' +
            '<span class="chint">' + card.hint + '</span>' +
          '</div>' +
        '</div>';
      wrap.addEventListener('click', function() { flipCard(idx); });
      grid.appendChild(wrap);
    })(i);
  }
}

function updateCards() {
  var wraps = document.querySelectorAll('.cw');
  for (var i=0; i<wraps.length; i++) {
    var card = cards[i];
    wraps[i].classList.remove('flipped','matched','wrong');
    if (matched[String(card.pairId)])       wraps[i].classList.add('matched','flipped');
    else if (flipped.indexOf(i) >= 0)       wraps[i].classList.add('flipped');
  }
}

function renderScores() {
  var bar = document.getElementById('sbar');
  bar.innerHTML = '';
  var mySan = sanitize(myName);
  var keys = Object.keys(scores).sort(function(a,b){ return scores[b]-scores[a]; });
  for (var i=0; i<keys.length; i++) {
    var k = keys[i];
    var isTurn = turnOrder[turnIdx] === k;
    var pill = document.createElement('div');
    pill.className = 'spill' + (isTurn ? ' turn' : '');
    pill.innerHTML = (k === mySan ? '👤 ' : '👥 ') + k + ' <span class="pts">' + scores[k] + '</span>';
    bar.appendChild(pill);
  }
}

function renderTurn() {
  var banner = document.getElementById('tbanner');
  var who = turnOrder[turnIdx];
  if (who === sanitize(myName)) {
    banner.textContent = '✨ Your turn! Flip two cards.';
    banner.className = 'tbanner mine';
  } else {
    banner.textContent = '⏳ ' + who + "'s turn…";
    banner.className = 'tbanner theirs';
  }
}

function renderSkip() {
  var btn = document.getElementById('btn-skip');
  btn.disabled = !(isMyTurn() && flipped.length === 0);
}

// ── FLIP CARD ────────────────────────────────────
function flipCard(idx) {
  if (!canFlip) return;
  if (matched[String(cards[idx].pairId)]) return;
  if (flipped.indexOf(idx) >= 0) return;
  if (!isMyTurn()) { toast("Not your turn!", 'err'); return; }

  flipped = flipped.concat([idx]);
  canFlip = flipped.length < 2;

  if (localMode) {
    updateCards();
    renderSkip();
    if (flipped.length < 2) return;
    canFlip = false;
    checkMatch();
  } else {
    db.ref('rooms/' + roomCode).update({flipped: flipped});
    if (flipped.length < 2) return;
    canFlip = false;
    checkMatchOnline();
  }
}

function checkMatch() {
  var i1 = flipped[0], i2 = flipped[1];
  var c1 = cards[i1], c2 = cards[i2];
  setTimeout(function() {
    if (c1.pairId === c2.pairId && c1.side !== c2.side) {
      matched[String(c1.pairId)] = true;
      scores[sanitize(myName)] = (scores[sanitize(myName)] || 0) + 1;
      flipped = [];
      updateCards(); renderScores(); renderSkip();
      canFlip = true;
      if (Object.keys(matched).length >= pairCount) {
        setTimeout(function() { showResults(scores, sanitize(myName)); }, 400);
      } else {
        toast('Match! Go again!', 'ok');
      }
    } else {
      var w1 = document.querySelectorAll('.cw')[i1];
      var w2 = document.querySelectorAll('.cw')[i2];
      if (w1) w1.classList.add('wrong');
      if (w2) w2.classList.add('wrong');
      setTimeout(function() {
        flipped = [];
        updateCards(); renderSkip();
        canFlip = true;
      }, 700);
    }
  }, 900);
}

function checkMatchOnline() {
  var i1 = flipped[0], i2 = flipped[1];
  var c1 = cards[i1], c2 = cards[i2];
  setTimeout(function() {
    if (c1.pairId === c2.pairId && c1.side !== c2.side) {
      var nm = {}; for (var k in matched) nm[k] = matched[k];
      nm[String(c1.pairId)] = true;
      var mySan = sanitize(myName);
      var ns = {}; for (var sk in scores) ns[sk] = scores[sk];
      ns[mySan] = (ns[mySan]||0) + 1;
      if (Object.keys(nm).length >= pairCount) {
        var winner = Object.keys(ns).sort(function(a,b){return ns[b]-ns[a];})[0];
        db.ref('rooms/'+roomCode).update({matched:nm,flipped:[],scores:ns,status:'ended',winner:winner});
      } else {
        db.ref('rooms/'+roomCode).update({matched:nm,flipped:[],scores:ns});
        toast('Match! Go again!', 'ok');
        canFlip = true;
      }
    } else {
      var w1 = document.querySelectorAll('.cw')[i1];
      var w2 = document.querySelectorAll('.cw')[i2];
      if (w1) w1.classList.add('wrong');
      if (w2) w2.classList.add('wrong');
      setTimeout(function() {
        var next = (turnIdx + 1) % turnOrder.length;
        db.ref('rooms/'+roomCode).update({flipped:[], turnIdx:next});
      }, 400);
    }
  }, 900);
}

// ── SKIP TURN ────────────────────────────────────
function skipTurn() {
  if (!isMyTurn() || flipped.length > 0) return;
  if (localMode) {
    toast('Skipped!', 'inf');
    return;
  }
  var next = (turnIdx + 1) % turnOrder.length;
  db.ref('rooms/'+roomCode).update({flipped:[], turnIdx:next});
  toast('Turn skipped', 'inf');
}

// ── COPY CODE ────────────────────────────────────
function copyCode() {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(roomCode).then(function() { toast('Copied: ' + roomCode, 'ok'); });
  } else {
    toast('Code: ' + roomCode, 'inf');
  }
}

// ── RESULTS ──────────────────────────────────────
function showResults(sc, winner) {
  if (document.getElementById('results').classList.contains('on')) return;
  if (db) db.ref('rooms/'+roomCode).off();
  show('results');
  gameLoaded = false; localMode = false;

  var mySan = sanitize(myName);
  document.getElementById('rtrophy').textContent = winner === mySan ? '🏆' : '🎮';
  document.getElementById('rtitle').textContent  = winner === mySan ? 'You Win! 🎉' : winner + ' Wins!';

  var keys = Object.keys(sc || {}).sort(function(a,b){ return (sc[b]||0)-(sc[a]||0); });
  var medals = ['🥇','🥈','🥉'];
  var pod = document.getElementById('podium');
  pod.innerHTML = '';
  for (var i=0; i<keys.length; i++) {
    var row = document.createElement('div');
    row.className = 'prow' + (i===0?' win':'');
    row.innerHTML = '<span class="medal">'+(medals[i]||'')+'</span><span class="pname">'+keys[i]+'</span><span class="pscore">'+sc[keys[i]]+' pts</span>';
    pod.appendChild(row);
  }
}

function playAgain() {
  gameLoaded = false;
  if (localMode || !db) {
    localMode = false;
    cards=[]; flipped=[]; matched={}; scores={}; turnOrder=[];
    startLocalGame();
    return;
  }
  if (myRole === 'host') {
    db.ref('rooms/'+roomCode).update({status:'waiting',deck:null,scores:null,matched:null,flipped:null,winner:null});
    show('waiting');
  } else {
    show('waiting');
  }
}

function leaveRoom() {
  if (db && inRoom && roomCode) {
    db.ref('rooms/'+roomCode).off();
    if (myRole==='host') db.ref('rooms/'+roomCode+'/status').set('ended');
    else db.ref('rooms/'+roomCode+'/players/'+sanitize(myName)).remove();
  }
  inRoom=false; roomCode=''; myName=''; myRole='';
  cards=[]; flipped=[]; matched={}; scores={}; turnOrder=[];
  gameLoaded=false; localMode=false;
  show('lobby');
}

// Wire buttons IMMEDIATELY — no waiting, no dependencies
(function() {
  function ready(fn) {
    if (document.readyState !== 'loading') { fn(); }
    else { document.addEventListener('DOMContentLoaded', fn); }
  }

  ready(function() {
    // Category buttons
    var catBtns = document.querySelectorAll('.cat');
    for (var i=0; i<catBtns.length; i++) {
      (function(btn){ btn.addEventListener('click', function(){ toggleCat(btn); }); })(catBtns[i]);
    }

    // Action buttons
    document.getElementById('btn-create').addEventListener('click',   createRoom);
    document.getElementById('btn-join').addEventListener('click',     joinRoom);
    document.getElementById('code-display').addEventListener('click', copyCode);
    document.getElementById('btn-start').addEventListener('click',    startGame);
    document.getElementById('btn-leave-h').addEventListener('click',  leaveRoom);
    document.getElementById('btn-leave-g').addEventListener('click',  leaveRoom);
    document.getElementById('btn-skip').addEventListener('click',     skipTurn);
    document.getElementById('btn-again').addEventListener('click',    playAgain);
    document.getElementById('btn-lobby').addEventListener('click',    leaveRoom);

    // Enter key shortcuts
    document.getElementById('host-name').addEventListener('keydown', function(e){ if(e.key==='Enter') createRoom(); });
    document.getElementById('join-name').addEventListener('keydown', function(e){ if(e.key==='Enter') joinRoom(); });
    document.getElementById('room-code').addEventListener('keydown', function(e){ if(e.key==='Enter') joinRoom(); });

    console.log('Buttons wired OK');
  });
})();

// Firebase init runs separately — a failure here CANNOT affect buttons
window.addEventListener('load', function() {
  try {
    if (typeof firebase !== 'undefined' && firebase.database) {
      if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(firebaseConfig);
      db = firebase.database();
      console.log('Firebase OK');
    } else {
      throw new Error('Firebase not available');
    }
  } catch(e) {
    db = null;
    console.warn('Firebase unavailable — solo mode:', e.message);
    var banner = document.getElementById('status-banner');
    if (banner) banner.style.display = 'block';
  }
});
</script>
</body>
